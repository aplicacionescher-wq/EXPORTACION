<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAM - Solicitud de Retornos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#611232">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#F4F4F4;}
.top-bar{background:#611232;color:#fff;padding:10px;text-align:center;font-weight:bold;}
.container{max-width:720px;margin:70px auto;background:#fff;padding:30px;border-radius:12px;border-top:8px solid #1E5B4F;}
input,select,textarea{width:100%;padding:10px;margin:6px 0 14px;border-radius:6px;border:1px solid #ccc;}
button{padding:12px;border:none;border-radius:6px;font-weight:bold;}
.btn-main{background:#1E5B4F;color:#fff;width:100%;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal-content{background:#fff;padding:25px;border-radius:12px;width:90%;max-width:420px;text-align:center;}
.modal button{width:100%;margin-top:10px;}
.btn-outlook{background:#0078D4;color:#fff;}
.btn-mail{background:#1E5B4F;color:#fff;}
.btn-copy{background:#A57F2C;color:#fff;}
.btn-close{background:#ccc;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:8px;font-size:12px;}
th{background:#611232;color:#fff;}
</style>
</head>

<body>

<div class="top-bar">Gobierno de México | ANAM</div>

<div class="container">
<form id="formRetorno">

<label>Operador</label>
<input type="text" id="operador" required>

<label>Tipo</label>
<select id="tipo">
<option value="normal">Normal</option>
<option value="revision">Revisión</option>
</select>

<label>Placas</label>
<textarea id="placas" required></textarea>

<div id="mercanciaDiv" style="display:none;">
<label>Mercancía</label>
<textarea id="mercancia"></textarea>
</div>

<button type="submit" class="btn-main">Generar</button>

<hr>

<input type="date" id="fechaConsulta">
<button type="button" onclick="consultar()">Consultar</button>
<button type="button" onclick="exportar()">Exportar Excel</button>

<div id="tabla"></div>

</form>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2>Enviar correo</h2>
    <button class="btn-outlook" onclick="abrirOutlook()">Abrir en Outlook</button>
    <button class="btn-mail" onclick="abrirCorreoNormal()">Correo normal</button>
    <button class="btn-copy" onclick="copiarCorreo()">Copiar</button>
    <button class="btn-close" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_41ENDRUYFLMMsQCXE2Ua8XZjSK5IiOI",
  authDomain: "retornos-anam-altamira.firebaseapp.com",
  databaseURL: "https://retornos-anam-altamira-default-rtdb.firebaseio.com",
  projectId: "retornos-anam-altamira",
  storageBucket: "retornos-anam-altamira.firebasestorage.app",
  messagingSenderId: "975848132753",
  appId: "1:975848132753:web:cdb84e00b5d33006ffef30"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Correos ANAM
const correosBase = [
"correo1@anam.gob.mx",
"correo2@anam.gob.mx",
"correo3@anam.gob.mx"
];

let outlookUrlGlobal="", mailtoGlobal="", cuerpoGlobal="";

// Mostrar mercancía
document.getElementById("tipo").addEventListener("change",()=>{
document.getElementById("mercanciaDiv").style.display =
document.getElementById("tipo").value==="revision"?"block":"none";
});

// Generar folio automático
async function generarFolio(){
const folioRef = ref(db,"folio");
const result = await runTransaction(folioRef,(current)=>{
return (current||0)+1;
});
return result.snapshot.val();
}

// Generar correo
document.getElementById("formRetorno").addEventListener("submit", async (e)=>{
e.preventDefault();

const operador=document.getElementById("operador").value;
const placas=document.getElementById("placas").value;
const merca=document.getElementById("mercancia").value;

const folio = await generarFolio();

let cuerpo=`FOLIO: ${folio}\n\nBuenas tardes,\n\n`;

if(document.getElementById("tipo").value==="revision"){

cuerpo+=`Por medio del presente, se solicita el valioso apoyo de la Subdirección de Vigilancia y Control para realizar la apertura del carril de excesos de exportación. Lo anterior, con la finalidad de permitir el ingreso y posicionamiento de la unidad con exceso de dimensiones en la explanada de vacíos.

Se les solicita de la manera más atenta confirmar en cuanto la unidad se encuentre debidamente posicionada.

PLACAS:
${placas}

MERCANCÍA:
${merca}

Posteriormente, la unidad será inspeccionada por el equipo ZBV del Departamento de Equipos No Intrusivos en la explanada de vacíos de importación.

De igual forma, se solicita dar aviso al personal del módulo una vez que la unidad haya sido revisada, así como responder a este correo electrónico al concluir la inspección.

Sin más por el momento, quedo atento a sus comentarios.

Gracias.

Saludos cordiales,
${operador}
Módulos
ANAM Altamira`;

}else{

cuerpo+=`El presente correo es para solicitar la apertura del carril correspondiente para el retorno del vehículo con las siguientes características:

PLACAS:
${placas}

Sin más por el momento, quedo atento.

Saludos cordiales,
${operador}
Módulos
ANAM Altamira`;

}

// Guardar
await push(ref(db,"registros"),{folio,operador,placas});

const to = encodeURIComponent(correosBase.join(","));
const subject = encodeURIComponent(`Solicitud ANAM - Folio ${folio}`);
const body = encodeURIComponent(cuerpo);

outlookUrlGlobal=`ms-outlook://compose?to=${to}&subject=${subject}&body=${body}`;
mailtoGlobal=`mailto:${to}?subject=${subject}&body=${body}`;
cuerpoGlobal=cuerpo;

document.getElementById("modal").style.display="flex";
});

// Funciones
window.abrirOutlook=()=>window.open(outlookUrlGlobal,"_system");
window.abrirCorreoNormal=()=>window.location.href=mailtoGlobal;
window.copiarCorreo=()=>navigator.clipboard.writeText(cuerpoGlobal);
window.cerrarModal=()=>document.getElementById("modal").style.display="none";

// Historial
window.consultar=async function(){
const snap=await get(ref(db,"registros"));
let html="<table><tr><th>Folio</th><th>Operador</th><th>Placas</th></tr>";
snap.forEach(d=>{
const v=d.val();
html+=`<tr><td>${v.folio}</td><td>${v.operador}</td><td>${v.placas}</td></tr>`;
});
document.getElementById("tabla").innerHTML=html+"</table>";
};

// Excel
window.exportar=async function(){
const snap=await get(ref(db,"registros"));
let data=[];
snap.forEach(d=>data.push(d.val()));
const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Datos");
XLSX.writeFile(wb,"reporte.xlsx");
};

</script>

</body>
</html>
