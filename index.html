<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAM - Solicitud de Retornos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#611232">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin: 0; font-family: Arial; background: #F4F4F4; }
.top-bar { background: #611232; color: #fff; padding: 10px; text-align: center; font-weight: bold; }

.container {
    max-width: 720px;
    margin: 70px auto;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    border-top: 8px solid #1E5B4F;
}

label { font-weight: bold; }
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.btn-main {
    background: #1E5B4F;
    color: #fff;
    padding: 14px;
    border: none;
    width: 100%;
    border-radius: 6px;
}

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  width: 90%;
  max-width: 420px;
  text-align: center;
}

.modal button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
}

.btn-outlook { background: #0078D4; color: white; }
.btn-copy { background: #A57F2C; color: white; }
.btn-mail { background: #1E5B4F; color: white; }
.btn-close { background: #ccc; }

</style>
</head>

<body>

<div class="top-bar">Gobierno de México | ANAM</div>

<div class="container">
<form id="formRetorno">

<label>Operador</label>
<input type="text" id="operador" required>

<label>Tipo</label>
<select id="tipo">
<option value="normal">Normal</option>
<option value="revision">Revisión</option>
</select>

<label>Placas</label>
<textarea id="placas" required></textarea>

<div id="mercanciaDiv" style="display:none;">
<label>Mercancía</label>
<textarea id="mercancia"></textarea>
</div>

<button type="submit" class="btn-main">Generar</button>

</form>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2>Enviar correo</h2>

    <button class="btn-outlook" onclick="abrirOutlook()">Abrir en Outlook</button>
    <button class="btn-mail" onclick="abrirCorreoNormal()">Abrir correo normal</button>
    <button class="btn-copy" onclick="copiarCorreo()">Copiar correo</button>
    <button class="btn-close" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>
let outlookUrlGlobal="";
let mailtoGlobal="";
let cuerpoGlobal="";

const form = document.getElementById("formRetorno");
const tipo = document.getElementById("tipo");

tipo.addEventListener("change",()=>{
    document.getElementById("mercanciaDiv").style.display =
        tipo.value==="revision" ? "block":"none";
});

form.addEventListener("submit", function(e){
    e.preventDefault();

    const operador = document.getElementById("operador").value;
    const placas = document.getElementById("placas").value;
    const merca = document.getElementById("mercancia").value;

    let cuerpo="Buenas tardes,\n\n";

    if(tipo.value==="revision"){
        cuerpo += "Por medio del presente, se solicita el valioso apoyo de la Subdirección de Vigilancia y Control para realizar la apertura del carril de excesos de exportación.\n\n";
        cuerpo += "PLACAS:\n"+placas+"\n\nMERCANCÍA:\n"+merca+"\n\n";
        cuerpo += "Saludos cordiales,\n"+operador;
    } else {
        cuerpo += "PLACAS:\n"+placas+"\n\n";
        cuerpo += "Saludos cordiales,\n"+operador;
    }

    const subject = encodeURIComponent("Solicitud ANAM");
    const body = encodeURIComponent(cuerpo);
    const to = "correo@anam.gob.mx";

    outlookUrlGlobal = `ms-outlook://compose?to=${to}&subject=${subject}&body=${body}`;
    mailtoGlobal = `mailto:${to}?subject=${subject}&body=${body}`;
    cuerpoGlobal = cuerpo;

    document.getElementById("modal").style.display="flex";
});

window.abrirOutlook = function () {
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid = /Android/i.test(navigator.userAgent);

    if (isIOS) {
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = outlookUrlGlobal;
        document.body.appendChild(iframe);
    } else if (isAndroid) {
        const intent = `intent://compose#Intent;scheme=ms-outlook;package=com.microsoft.office.outlook;end`;
        window.location.href = intent;
    }
};

window.abrirCorreoNormal = function () {
    window.location.href = mailtoGlobal;
};

window.copiarCorreo = function () {
    navigator.clipboard.writeText(cuerpoGlobal);
    alert("Correo copiado");
};

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
