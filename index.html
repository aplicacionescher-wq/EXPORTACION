<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANAM - Solicitud de Retornos</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#611232">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #F4F4F4; color: #161A1D; }
        .top-bar { background: #611232; color: #fff; padding: 10px 15px; font-size: 13px; font-weight: bold; text-align: center; }
        
        .container {
            position: relative; background: #ffffffee; max-width: 720px;
            margin: 70px auto 20px; padding: 40px 25px 30px;
            border-radius: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid #1E5B4F; overflow: hidden;
        }

        .container::before {
            content: ""; position: absolute; inset: 0;
            background: url("logo-anam.png") center center no-repeat;
            background-size: 280px; opacity: 0.05; pointer-events: none;
        }

        .logo-gota {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 85px; height: 85px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.7); box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            border: 3px solid #A57F2C; z-index: 2;
        }

        .logo-gota img { width: 65px; }
        .title { text-align: center; color: #611232; font-size: 18px; font-weight: bold; margin: 15px 0; }
        h3 { color: #611232; border-bottom: 2px solid #A57F2C; padding-bottom: 6px; font-size: 15px; }

        label { font-weight: bold; font-size: 14px; display: block; margin-top: 10px; }
        select, input, textarea { width: 100%; padding: 10px; margin: 6px 0 14px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        #placas { text-transform: uppercase; font-family: monospace; height: 80px; }

        .btn-main { background: #1E5B4F; color: #fff; padding: 14px; border: none; width: 100%; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; margin-top: 6px; }
        .btn-main:disabled { background: #999; cursor: not-allowed; opacity: 0.6; }
        .btn-query { background: #611232; color: #fff; padding: 10px; border: none; width: 100%; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; margin-top: 8px; }

        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 8px; font-size: 12px; text-align: center; }
        th { background: #611232; color: #fff; }

        .modal { display: none; position: fixed; z-index: 999; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        .modal h2 { color: #611232; margin-top: 0; font-size: 20px; }
        
        .link-button { 
            display: block; text-decoration: none; background: #0078D4; color: white; 
            padding: 16px; border-radius: 8px; font-weight: bold; margin-top: 12px; font-size: 15px;
        }
        .btn-copy { background: #A57F2C; color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; margin-top: 12px; cursor: pointer; }
        .btn-close { background: #f0f0f0; color: #333; width: 100%; padding: 12px; border: none; border-radius: 8px; margin-top: 12px; cursor: pointer; }
    </style>
</head>

<body>

    <div class="top-bar">Gobierno de México | Agencia Nacional de Aduanas de México</div>

    <div class="container">
        <div class="logo-gota"><img src="logo-anam2.png" alt="ANAM"></div>
        <div class="title">Solicitud de Retornos Módulos</div>

        <form id="formRetorno">
            <p><strong>Folio:</strong> <span id="folio">--</span> | <strong>Fecha:</strong> <span id="fechaHora"></span></p>

            <label>Tipo de Operación</label>
            <select id="operacion" required>
                <option value="EXPORTACION" selected>EXPORTACION</option>
            </select>

            <label>Operador de Módulos</label>
            <input type="text" id="operador" placeholder="Tu nombre completo" required>

            <label>Tipo de Solicitud</label>
            <select id="tipo" required>
                <option value="nueva" selected>Retorno Para Nueva Exploración</option>
                <option value="horario">Retorno Fuera De Horario</option>
                <option value="sin_extra">Retorno Sin Servicio Extraordinario</option>
                <option value="carril">Retorno Por Equivocación de Carril</option>
                <option value="revision">Solicitud de Revisión Con ZBV De Mercancía Sobre-Dimensionada</option>
            </select>

            <label>Placas</label>
            <textarea id="placas" placeholder="Ej: 12ABC34" required></textarea>

            <div id="mercanciaDiv" class="hidden">
                <label>Descripción de la Mercancía</label>
                <textarea id="mercancia" placeholder="Detalle de la carga sobredimensionada"></textarea>
            </div>

            <button type="submit" id="btnGenerar" class="btn-main" disabled>Generar Folio</button>

            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd;">
            
            <label>Historial de Registros</label>
            <input type="date" id="fechaConsulta">
            <button type="button" id="btnConsultar" class="btn-query">CONSULTAR REGISTROS</button>
            <button type="button" id="btnExportar" class="btn-query">EXPORTAR EXCEL</button>
            
            <div id="tablaResultados" style="overflow-x:auto;"></div>
        </form>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Folio Generado</h2>
            <p>Datos guardados. Toca para abrir Outlook:</p>
            
            <a id="btnOutlookReal" class="link-button" href="#">ABRIR EN OUTLOOK</a>
            
            <button class="btn-copy" id="btnCopiar">COPIAR TEXTO (Manual)</button>
            <button class="btn-close" id="btnCerrarModal">LIMPIAR Y CERRAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, runTransaction, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "retornos-anam-altamira.firebaseapp.com",
            databaseURL: "https://retornos-anam-altamira-default-rtdb.firebaseio.com",
            projectId: "retornos-anam-altamira",
            storageBucket: "retornos-anam-altamira.firebasestorage.app",
            messagingSenderId: "975848132753",
            appId: "1:975848132753:web:cdb84e00b5d33006ffef30"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const form = document.getElementById("formRetorno");
        const tipoSelect = document.getElementById("tipo");
        const mercanciaDiv = document.getElementById("mercanciaDiv");
        const btnGenerar = document.getElementById("btnGenerar");
        const fechaConsultaInput = document.getElementById("fechaConsulta");
        
        let cuerpoActual = "";
        const hoyStr = new Date().toISOString().split("T")[0];
        fechaConsultaInput.value = hoyStr;

        const correosBase = "juan.reyesg@anam.gob.mx,vyc.altamira@anam.gob.mx,alejandra.munoz@anam.gob.mx,jorge.silva@anam.gob.mx,abraham.gomez@anam.gob.mx,daniel.santosh@anam.gob.mx,christian.monrreal@anam.gob.mx,monica.becerra@anam.gob.mx,anahi.santiago@anam.gob.mx";
        const correosExtra = ",emilio.garin@anam.gob.mx,sergio.diazr@anam.gob.mx,oscar.narro@anam.gob.mx";

        setInterval(() => { document.getElementById("fechaHora").textContent = new Date().toLocaleString(); }, 1000);

        form.addEventListener("input", () => { btnGenerar.disabled = !form.checkValidity(); });
        
        tipoSelect.addEventListener("change", () => {
            const esRevision = (tipoSelect.value === "revision");
            mercanciaDiv.classList.toggle("hidden", !esRevision);
            document.getElementById("mercancia").required = esRevision;
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            btnGenerar.disabled = true;

            const hoy = new Date();
            const idFecha = hoy.getFullYear() + ("0" + (hoy.getMonth() + 1)).slice(-2) + ("0" + hoy.getDate()).slice(-2);
            const refCont = ref(db, 'contadorFolios/' + idFecha);
            
            const res = await runTransaction(refCont, (c) => (c || 0) + 1);
            const folioFinal = `RET-${idFecha}-${res.snapshot.val().toString().padStart(3, "0")}`;
            document.getElementById("folio").textContent = folioFinal;

            const saludo = (hoy.getHours() < 12) ? "Buenos días" : (hoy.getHours() < 19) ? "Buenas tardes" : "Buenas noches";
            const op = document.getElementById("operacion").value;
            const placasVal = document.getElementById("placas").value.toUpperCase();
            const operadorVal = document.getElementById("operador").value;
            const mercaVal = document.getElementById("mercancia").value;
            const tipoText = tipoSelect.options[tipoSelect.selectedIndex].text;

            let cuerpo = saludo + ",\n\n";
            if(tipoSelect.value === "revision"){
                cuerpo += "Por medio del presente, se solicita el valioso apoyo de la Subdirección de Vigilancia y Control para realizar la apertura del carril de excesos de exportación. Lo anterior, con la finalidad de permitir el ingreso y posicionamiento de la unidad con exceso de dimensiones en la explanada de vacíos.\n\n" +
                          "Se les solicita de la manera más atenta confirmar en cuanto la unidad se encuentre debidamente posicionada.\n\n" +
                          "PLACAS: " + placasVal + "\n" +
                          "MERCANCÍA: " + mercaVal + "\n\n" +
                          "Posteriormente, la unidad será inspeccionada por el equipo ZBV del Departamento de Equipos No Intrusivos en la explanada de vacíos de importación.\n\n" +
                          "De igual forma, se solicita dar aviso al personal del módulo una vez que la unidad haya sido revisada, así como responder a este correo electrónico al concluir la inspección.\n\n" +
                          "Sin más por el momento, quedo atento a sus comentarios.\n\n" +
                          "Gracias.\n\nSaludos cordiales,\n" + operadorVal + "\nMódulos ANAM Altamira";
            } else {
                const area = (op === "EXPORTACION") ? "del carril de excesos a la exportación" : "de la Puerta Caracol";
                cuerpo += "El presente correo es para solicitar la apertura " + area + " para el retorno al vehículo con las placas siguientes:\n\n" +
                          "PLACAS: " + placasVal + "\n" +
                          "TIPO DE RETORNO: " + tipoText + "\n\n" +
                          "Gracias.\n\nSaludos cordiales,\n" + operadorVal + "\nMódulos ANAM Altamira";
            }

            cuerpoActual = cuerpo;
            await push(ref(db, "retornos"), { 
                folio: folioFinal, 
                fecha: hoy.toISOString(), 
                operador: operadorVal, 
                placas: placasVal, 
                tipo: tipoSelect.value,
                operacion: op
            });

            const to = (tipoSelect.value === "revision") ? correosBase + correosExtra : correosBase;
            const subject = `${op} - ${tipoText}`;
            
            // DETECCIÓN DE IPHONE / IPAD
            const isApple = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            let finalUrl = "";

            if (isApple) {
                // Esquema exclusivo de la APP de Outlook para iOS
                finalUrl = `ms-outlook://compose?to=${to}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(cuerpo)}`;
            } else {
                // mailto estándar para Android y PC
                finalUrl = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(cuerpo)}`;
            }
            
            document.getElementById("btnOutlookReal").href = finalUrl;
            document.getElementById("modalTitle").textContent = "Folio: " + folioFinal;
            document.getElementById("modal").style.display = "flex";
        });

        document.getElementById("btnCerrarModal").onclick = () => {
            document.getElementById("modal").style.display = "none";
            form.reset(); 
            document.getElementById("folio").textContent = "--";
            mercanciaDiv.classList.add("hidden");
            btnGenerar.disabled = true;
            fechaConsultaInput.value = hoyStr; 
        };

        document.getElementById("btnCopiar").onclick = () => {
            navigator.clipboard.writeText(cuerpoActual).then(() => alert("Copiado al portapapeles."));
        };

        document.getElementById("btnConsultar").onclick = async () => {
            const snap = await get(ref(db, "retornos"));
            const fechaBuscada = fechaConsultaInput.value;
            let html = "<table><tr><th>Hora</th><th>Folio</th><th>Operador</th><th>Placas</th></tr>";
            let contador = 0;

            if (snap.exists()) {
                snap.forEach(d => {
                    const v = d.val();
                    if (v.fecha && v.fecha.startsWith(fechaBuscada)) {
                        const hora = new Date(v.fecha).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        html += `<tr>
                            <td>${hora}</td>
                            <td>${v.folio || 'N/A'}</td>
                            <td>${v.operador}</td>
                            <td>${v.placas}</td>
                        </tr>`;
                        contador++;
                    }
                });
            }

            if (contador === 0) {
                document.getElementById("tablaResultados").innerHTML = "<p style='text-align:center; font-size:12px; color:red; margin-top:10px;'>No hay registros en esta fecha.</p>";
            } else {
                document.getElementById("tablaResultados").innerHTML = html + "</table>";
            }
        };

        document.getElementById("btnExportar").onclick = async () => {
            const snap = await get(ref(db, "retornos"));
            let data = [];
            snap.forEach(d => data.push(d.val()));
            if(data.length === 0) return alert("No hay datos para exportar");
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Registros");
            XLSX.writeFile(wb, "Reporte_Retornos_Altamira.xlsx");
        };

    </script>
</body>
</html>
